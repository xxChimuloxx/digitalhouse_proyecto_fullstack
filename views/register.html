<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelForge Store | Registro</title>
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-content">
      <a class="logo" href="index.html">Pixel<span>Forge</span></a>
      <form class="search-box"><input type="text" placeholder="Buscar productos gamer..."></form>
      <nav class="nav-actions">
        <a href="login.html">Login</a>
        <a href="productCart.html">Carrito</a>
      </nav>
    </div>
  </header>

  <main class="container form-page">
    <section class="form-card">
      <h1>Crear cuenta</h1>
      <p class="muted">Registrate para acceder a tu perfil e historial de compras.</p>
      <form>
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input id="nombre" type="text" placeholder="Sebastián">
        </div>
        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input id="apellido" type="text" placeholder="Fuentes">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="usuario@email.com">
          <p class="form-error">Ejemplo visual de error: ingresá un email válido.</p>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="********">
        </div>
        <div class="form-group">
          <label for="password2">Confirmar contraseña</label>
          <input id="password2" type="password" placeholder="********">
        </div>
        <button class="btn btn-secondary" type="button">Crear cuenta</button>
      </form>
      <div class="form-links">
        <a href="login.html">Ya tengo cuenta</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container"><p>PixelForge Store | Registro</p></div>
  </footer>
</body>
</html>
