<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelForge Store | Login</title>
  <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-content">
      <a class="logo" href="index.html">Pixel<span>Forge</span></a>
      <form class="search-box"><input type="text" placeholder="Buscar productos gamer..."></form>
      <nav class="nav-actions">
        <a href="login.html">Login</a>
        <a href="productCart.html">Carrito</a>
      </nav>
    </div>
  </header>

  <main class="container form-page">
    <section class="form-card">
      <h1>Iniciar sesión</h1>
      <p class="muted">Ingresá para consultar tu historial de compras.</p>
      <form>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="usuario@email.com">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="********">
          <p class="form-error">Ejemplo visual de error: contraseña obligatoria.</p>
        </div>
        <label class="checkbox-line">
          <input type="checkbox">
          Recordarme en este equipo
        </label>
        <button class="btn btn-secondary" type="button">Ingresar</button>
      </form>
      <div class="form-links">
        <a href="#">Olvidé mi contraseña</a>
        <a href="register.html">Crear una cuenta nueva</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container"><p>PixelForge Store | Login</p></div>
  </footer>
</body>
</html>
